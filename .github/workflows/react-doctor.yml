name: 🏥 React Doctor

on: push

permissions:
  contents: read
  pull-requests: write

jobs:
  react-doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - uses: millionco/react-doctor@main
        with:
          diff: true
          github-token: ${{ secrets.GITHUB_TOKEN }}