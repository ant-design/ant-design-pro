name: Preview Deploy

on:
  workflow_run:
    workflows: ['Preview Build']
    types:
      - completed

permissions:
  contents: read

jobs:
  # Job id `deploy` is part of the preview URL and MUST match the teardown job id.
  deploy:
    permissions:
      actions: read # for dawidd6/action-download-artifact to query and download artifacts
      checks: write # for surge-preview to publish the deployment as a commit check run
      issues: write # for surge-preview to modify or create issue comments
      pull-requests: write # for surge-preview to modify or create PR comments
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success'
    steps:
      - name: download dist artifact
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
        with:
          workflow: ${{ github.event.workflow_run.workflow_id }}
          workflow_conclusion: success
          name: dist
          path: dist

      - name: Deploy to Surge
        uses: afc163/surge-preview@v1
        with:
          surge_token: ${{ secrets.SURGE_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          build: echo done
          dist: dist
          failOnError: true
          teardown: false # teardown is handled by the separate workflow
          screenshot: true
          lighthouse: true
          setCommitStatus: true
        env:
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
